<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <title>Document</title>
  <style>
    .data-db {
      background-color: #06b6d4;
      color: #101828;
      border: 1px solid white;
      border-right: 0;
      text-align: center;
      padding: 20px;
    }

    .delete-style {
      background-color: red;
      cursor: pointer;
      color: white;
    }

    .total-display {
      padding: 0;
      box-sizing: border-box;
      background-color: green;
      color: white;
      font-size: 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>

<body class="w-screen bg-gray-300">
  <h1 class="text-center m-[3%] text-3xl font-bold font-mono tracking-tighter">
    Expense Tracker App
  </h1>
  <section class="w-[100%] flex justify-between px-[10%]">
    <main>
      <label for="sel">select an option</label>
      <select name="" id="sel" class="border border-black bg-gray-900 text-cyan-500 rounded-xs p-2.5">
        <option value="House-rent">House-rent</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Miscelleneous">Miscelleneous</option>
      </select>
    </main>
    <main>
      <label for="inp">Amount</label>
      <input type="number" id="inp" value="0" class="border border-black bg-gray-900 text-cyan-500 rounded-xs p-2.5" />
    </main>
    <main>
      <label for="date">Date</label>
      <input type="date" name="" id="date" class="border border-black bg-gray-900 text-cyan-500 rounded-xs p-2.5" />
    </main>
  </section>
  <main class="width-[100%] flex justify-center py-15">
    <button class="w-[10%] rounded-md text-gray-900 bg-cyan-500 p-3 cursor-pointer add-btn">
      Add
    </button>
  </main>
  <section class="w-[100%] px-[10%]">
    <div class="grid grid-cols-4 place-self-center w-[100%] grid-db">
      <div class="border border-r-0 border-white text-center bg-gray-900 text-cyan-500 p-5">
        Category
      </div>
      <div class="border border-r-0 border-white text-center bg-gray-900 text-cyan-500 p-5">
        Amount
      </div>
      <div class="border border-r-0 border-white text-center bg-gray-900 text-cyan-500 p-5">
        Date
      </div>
      <div class="border border-white text-center bg-gray-900 text-cyan-500 p-5">
        Delete
      </div>
      <div class="data-db total">TOTAL</div>
      <div class="data-db total-display">0</div>
    </div>
  </section>
  <script src="app.js"></script>
</body>

</html>
